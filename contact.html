<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Gooner ahh</title>
  <meta name="description" content="Get in touch with our team." />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="container">
      <h1 class="logo">
        <a href="index.html">Gooner ahh</a>
      </h1>
      <nav class="main-nav" role="navigation" aria-label="Primary">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content" role="main">
    <section class="contact section-padding">
      <div class="container">
        <h2>Contact Us</h2>
        <form class="contact-form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your Name" required />
          
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your.email@example.com" required />
          
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
          
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p>&copy; 2025 Gooner ahh. All rights reserved.</p>
      <div class="social-links">
        <a href="#" aria-label="Twitter">X</a>
        <a href="#" aria-label="Facebook">Facebook</a>
        <a href="#" aria-label="Instagram">Instagram</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
